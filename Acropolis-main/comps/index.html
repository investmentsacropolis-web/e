<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acropolis — Comps</title>
  <link rel="stylesheet" href="../styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.32.0/plotly.min.js"></script>
  <script src="../components/plotly-utils.js"></script>
  <style>
    /* ── Sidebar width override ── */
    #sidebar { width: 260px; min-width: 260px; }
    #content  { margin-left: 260px; }

    /* ── Sidebar inputs ── */
    .comp-input-group { margin-bottom: 16px; }
    .comp-input-label {
      font-family: var(--sans);
      font-size: 0.76rem;
      font-weight: 500;
      color: var(--dim);
      margin-bottom: 6px;
      display: block;
    }
    .comp-input {
      font-family: var(--sans);
      font-size: 0.86rem;
      background: #282828;
      border: 1px solid var(--border2);
      color: var(--dim);
      padding: 8px 12px;
      outline: none;
      width: 100%;
      transition: border-color 0.12s;
    }
    .comp-input:focus { border-color: #686868; color: var(--bright); }
    .comp-input::placeholder { color: #555; }

    .sidebar-rule { border: none; border-top: 1px solid var(--grid); margin: 16px 0; }
    .sidebar-section-label {
      font-family: var(--sans);
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #E0E0E0;
      margin-bottom: 12px;
      display: block;
    }

    /* ── Fetch / run buttons ── */
    .comp-btn {
      font-family: var(--sans);
      font-size: 0.76rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--dim);
      padding: 9px 0;
      width: 100%;
      cursor: pointer;
      display: block;
      margin-top: 8px;
      transition: color 0.12s, background 0.12s, border-color 0.12s;
    }
    .comp-btn:hover:not(:disabled) { color: var(--bright); background: #383838; border-color: #686868; }
    .comp-btn:disabled { opacity: 0.35; cursor: default; }
    .comp-btn.run { margin-top: 4px; }

    /* ── Sidebar comp mini-card ── */
    .sb-comp-card {
      background: #2A2A2A;
      border: 1px solid var(--border);
      padding: 8px 10px;
      margin-bottom: 4px;
    }
    .sb-comp-ticker {
      font-family: var(--sans);
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--dim);
      letter-spacing: 0.06em;
    }
    .sb-comp-name {
      font-family: var(--sans);
      font-size: 0.70rem;
      color: var(--muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sb-comp-meta {
      font-family: var(--sans);
      font-size: 0.68rem;
      color: #555;
      letter-spacing: 0.04em;
      margin-top: 2px;
    }
    .sb-remove-btn {
      font-family: var(--sans);
      font-size: 0.68rem;
      background: #2E2E2E;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 3px 8px;
      cursor: pointer;
      margin-top: 4px;
      width: 100%;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
    }
    .sb-remove-btn:hover { color: var(--red); border-color: var(--red); background: rgba(196,112,96,0.08); }

    /* ── Subject card ── */
    .subject-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 18px 22px;
      margin-bottom: 20px;
    }
    .subject-name {
      font-family: 'Times New Roman MT', 'Times New Roman', Times, serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 3px;
    }
    .subject-meta {
      font-family: var(--sans);
      font-size: 0.74rem;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .subject-kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 0;
      border-top: 1px solid var(--grid);
      padding-top: 14px;
    }
    .subject-kpi { padding: 0 16px 0 0; }
    .subject-kpi-label {
      font-family: var(--sans);
      font-size: 0.68rem;
      color: var(--label);
      margin-bottom: 4px;
    }
    .subject-kpi-value {
      font-family: var(--sans);
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--bright);
    }

    /* ── Comp tabs ── */
    .comp-tabs {
      display: flex;
      border-bottom: 1px solid var(--grid);
      margin-bottom: 0;
    }
    .comp-tab {
      font-family: var(--sans);
      font-size: 0.84rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #7C7C7C;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 12px 18px;
      cursor: pointer;
      margin-bottom: -1px;
      transition: color 0.12s;
    }
    .comp-tab:hover { color: var(--dim); }
    .comp-tab.active { color: var(--bright); border-bottom-color: var(--dim); }

    /* ── Table subject row ── */
    .fin-table tbody tr.subject-row { background: #303030 !important; border-left: 2px solid var(--dim); }
    .fin-table tbody tr.subject-row td:first-child { color: var(--bright); font-weight: 600; }
    .fin-table tbody tr.stat-row { border-top: 1px solid var(--border2); }
    .fin-table tbody tr.stat-row td { color: var(--dim); font-weight: 500; }
    .fin-table tbody tr.stat-row td:first-child { color: var(--dim); }

    /* ── Empty state ── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 340px;
      text-align: center;
    }
    .empty-title {
      font-family: var(--sans);
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--dim);
      margin-bottom: 8px;
    }
    .empty-sub {
      font-family: var(--sans);
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* ── Period selector ── */
    .perf-period-row {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-top: 8px;
      margin-bottom: 18px;
    }
    .perf-period-btn {
      font-family: var(--sans);
      font-size: 0.80rem;
      font-weight: 500;
      background: #2E2E2E;
      border: 1px solid var(--border2);
      border-right: none;
      color: var(--muted);
      padding: 5px 13px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      text-transform: uppercase;
    }
    .perf-period-btn:last-child { border-right: 1px solid var(--border2); }
    .perf-period-btn:hover { background: #383838; color: var(--dim); }
    .perf-period-btn.active { background: #3A3A3A; color: var(--bright); border-color: #686868; }

    /* ── Scatter point labels ── */
    .scatter-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
      font-family: var(--sans);
      font-size: 0.74rem;
      color: var(--muted);
    }

    /* ── Premium/discount badges ── */
    .prem-badge {
      display: inline-block;
      padding: 2px 8px;
      font-size: 0.72rem;
      font-weight: 500;
    }
    .prem-badge.premium  { background: rgba(196,112,96,0.15); color: var(--red); }
    .prem-badge.discount { background: rgba(107,175,138,0.15); color: var(--green); }

    @media (max-width: 900px) {
      #sidebar { display: none; }
      #content  { margin-left: 0; }
    }
  </style>
</head>
<body data-page="comps">

<div id="app">
  <header id="topbar"></header>

  <div class="main-content">
    <!-- Sidebar -->
    <aside id="sidebar">
      <nav class="sidebar-nav" style="padding: 20px 0 0;">
        <div style="padding: 0 20px;">

          <!-- Subject -->
          <span class="sidebar-section-label">Subject</span>
          <div class="comp-input-group">
            <label class="comp-input-label">Ticker</label>
            <input id="subject-input" class="comp-input" type="text"
              placeholder="e.g. AAPL" maxlength="12"
              onkeydown="if(event.key==='Enter')fetchSubject()" />
            <button class="comp-btn" onclick="fetchSubject()">Fetch subject</button>
          </div>

          <hr class="sidebar-rule" />

          <!-- Add comparables -->
          <span class="sidebar-section-label">Add Comparables</span>
          <div class="comp-input-group">
            <label class="comp-input-label">Ticker(s), comma separated</label>
            <input id="add-input" class="comp-input" type="text"
              placeholder="e.g. MSFT, GOOG" maxlength="60"
              onkeydown="if(event.key==='Enter')addComps()" />
            <button class="comp-btn" onclick="addComps()">Add comps</button>
          </div>

          <!-- Run button -->
          <button id="run-btn" class="comp-btn run" onclick="runAnalysis()" disabled>
            Run analysis
          </button>

          <hr class="sidebar-rule" />

          <!-- Comp set list -->
          <div id="comp-set-list"></div>

          <div style="height:16px;"></div>
          <div style="font-family:var(--sans);font-size:0.68rem;letter-spacing:0.06em;
            color:#444;text-transform:uppercase;border-top:1px solid #333;padding-top:10px;">
            Data via Yahoo Finance · Not financial advice
          </div>
        </div>
      </nav>
    </aside>

    <!-- Main content -->
    <main id="content">
      <div id="comps-content">
        <div id="empty-state">
          <div class="empty-title">Comparable Company Analysis</div>
          <div class="empty-sub">Enter a subject ticker in the sidebar to begin</div>
        </div>
      </div>
      <div id="footer">For informational purposes only</div>
    </main>
  </div>
</div>

<script src="../components/shell.js"></script>
<script src="comps.js"></script>
</body>
</html>
