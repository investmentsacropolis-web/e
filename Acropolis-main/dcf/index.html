<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acropolis — DCF</title>
  <link rel="stylesheet" href="../styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.32.0/plotly.min.js"></script>
  <style>
    /* ── Widen sidebar for DCF ── */
    #sidebar { width: 260px; min-width: 260px; }
    #content  { margin-left: 260px; }

    /* ── Sidebar input row ── */
    .dcf-input-group { margin-bottom: 20px; }
    .dcf-input-label {
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--dim);
      margin-bottom: 6px;
      display: block;
    }
    .dcf-input {
      font-family: var(--sans);
      font-size: 0.86rem;
      background: #282828;
      border: 1px solid var(--border2);
      color: var(--dim);
      padding: 8px 12px;
      outline: none;
      width: 100%;
      transition: border-color 0.12s;
    }
    .dcf-input:focus { border-color: #686868; color: var(--bright); }
    .dcf-select {
      font-family: var(--sans);
      font-size: 0.86rem;
      background: #282828;
      border: 1px solid var(--border2);
      color: var(--dim);
      padding: 8px 12px;
      outline: none;
      width: 100%;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.12s;
    }
    .dcf-select:focus { border-color: #686868; }

    /* ── Sidebar divider ── */
    .sidebar-rule {
      border: none;
      border-top: 1px solid var(--grid);
      margin: 20px 0;
    }
    .sidebar-section-label {
      font-family: var(--sans);
      font-size: 0.76rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #E0E0E0;
      margin-bottom: 14px;
      display: block;
    }

    /* ── Fetch button ── */
    #fetch-btn {
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--dim);
      padding: 9px 0;
      width: 100%;
      cursor: pointer;
      display: block;
      margin-top: 10px;
      transition: color 0.12s, background 0.12s, border-color 0.12s;
    }
    #fetch-btn:hover { color: var(--bright); background: #383838; border-color: #686868; }

    /* ── DCF tabs (styled to match topbar-link underline pattern) ── */
    .dcf-tabs {
      display: flex;
      border-bottom: 1px solid var(--grid);
      margin-bottom: 0;
    }
    .dcf-tab {
      font-family: var(--sans);
      font-size: 0.84rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #7C7C7C;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 12px 18px;
      cursor: pointer;
      margin-bottom: -1px;
      transition: color 0.12s;
    }
    .dcf-tab:hover { color: var(--dim); }
    .dcf-tab.active { color: var(--bright); border-bottom-color: var(--dim); }

    /* ── Implied price hero card ── */
    .implied-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px 28px;
      margin-bottom: 18px;
    }
    .implied-card-label {
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--label);
      margin-bottom: 10px;
    }
    .implied-card-value {
      font-size: 2.6rem;
      font-weight: 500;
      color: #F0F0F0;
      line-height: 1;
      margin-bottom: 12px;
    }
    .implied-card-sub {
      font-family: var(--sans);
      font-size: 0.80rem;
      color: var(--muted);
    }
    .implied-card-sub .pos { color: var(--green); }
    .implied-card-sub .neg { color: var(--red); }

    /* ── Projection table ── */
    .proj-grid {
      display: grid;
      gap: 0;
      border: 1px solid var(--border);
      margin-bottom: 16px;
      overflow-x: auto;
    }
    .proj-row {
      display: flex;
      border-bottom: 1px solid var(--grid);
    }
    .proj-row:last-child { border-bottom: none; }
    .proj-cell {
      flex: 1;
      padding: 10px 12px;
      font-family: var(--sans);
      font-size: 0.84rem;
      color: var(--dim);
      border-right: 1px solid var(--grid);
      background: var(--surface);
      min-width: 80px;
    }
    .proj-cell:last-child { border-right: none; }
    .proj-cell.header {
      font-size: 0.72rem;
      color: var(--label);
      background: #222;
    }
    .proj-cell.label-col {
      font-size: 0.72rem;
      color: var(--label);
      min-width: 140px;
      flex: 0 0 140px;
    }
    .proj-input {
      font-family: var(--sans);
      font-size: 0.84rem;
      text-align: center;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border2);
      color: var(--dim);
      width: 100%;
      outline: none;
      padding: 2px 0;
      transition: border-color 0.12s;
    }
    .proj-input:focus { border-bottom-color: var(--muted); color: var(--bright); }

    /* ── Remove number input spinner arrows everywhere on this page ── */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }

    /* ── Run button ── */
    #run-dcf-btn {
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--dim);
      padding: 10px 28px;
      cursor: pointer;
      margin-bottom: 20px;
      transition: color 0.12s, background 0.12s;
    }
    #run-dcf-btn:hover { color: var(--bright); background: #383838; }

    /* ── Section divider ── */
    .dcf-divider {
      border: none;
      border-top: 1px solid var(--grid);
      margin: 20px 0;
    }

    /* ── Empty state ── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 320px;
      text-align: center;
    }
    .empty-title {
      font-family: var(--sans);
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--dim);
      margin-bottom: 8px;
    }
    .empty-sub {
      font-family: var(--sans);
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* ── Sensitivity heatmap ── */
    .sens-wrap { overflow-x: auto; border: 1px solid var(--border); margin-bottom: 16px; }
    .sens-table { width: 100%; border-collapse: collapse; font-family: var(--sans); font-size: 0.78rem; }
    .sens-table th, .sens-table td { padding: 8px 14px; text-align: center; white-space: nowrap; border-bottom: 1px solid #323232; border-right: 1px solid #323232; }
    .sens-table th { background: #222; color: var(--label); font-size: 0.70rem; font-weight: 500; }
    .sens-table td { color: var(--dim); }
    .sens-table td.sens-low  { background: rgba(196,112,96,0.25); color: #E09080; }
    .sens-table td.sens-mid  { background: rgba(196,168,74,0.18); color: #D4B85A; }
    .sens-table td.sens-high { background: rgba(107,175,138,0.22); color: #7DC49A; }
    .sens-table td.sens-base { outline: 2px solid var(--dim); outline-offset: -2px; }

    @media (max-width: 900px) {
      #sidebar { display: none; }
      #content  { margin-left: 0; }
    }
  </style>
</head>
<body data-page="dcf">

<div id="app">
  <header id="topbar"></header>

  <div class="main-content">
    <aside id="sidebar">
      <nav class="sidebar-nav" style="padding: 20px 0 0;">
        <div style="padding: 0 22px;">

          <div class="dcf-input-group">
            <label class="dcf-input-label">Ticker</label>
            <input id="dcf-ticker" class="dcf-input" type="text"
              placeholder="e.g. AAPL" maxlength="12"
              onkeydown="if(event.key==='Enter')fetchData()" />
            <button id="fetch-btn" onclick="fetchData()">Fetch data</button>
          </div>

          <hr class="sidebar-rule" />
          <span class="sidebar-section-label">Assumptions</span>

          <div class="dcf-input-group">
            <label class="dcf-input-label">Projection years</label>
            <input id="proj-years" class="dcf-input" type="number" value="5" min="1" max="10" />
          </div>

          <div class="dcf-input-group">
            <label class="dcf-input-label">WACC (%)</label>
            <input id="wacc" class="dcf-input" type="number" value="10.0" step="0.1" min="1" max="30" />
          </div>

          <div class="dcf-input-group">
            <label class="dcf-input-label">Terminal growth rate (%)</label>
            <input id="terminal-g" class="dcf-input" type="number" value="2.5" step="0.1" min="0" max="8" />
          </div>

          <div class="dcf-input-group">
            <label class="dcf-input-label">Projection mode</label>
            <select id="proj-mode" class="dcf-select">
              <option value="revenue">Revenue + FCF margin</option>
              <option value="fcf">Direct FCF</option>
            </select>
          </div>

        </div>
      </nav>
    </aside>

    <main id="content">
      <div id="dcf-content">
        <div id="empty-state">
          <div class="empty-title">Discounted cash flow</div>
          <div class="empty-sub">Enter a ticker in the sidebar and click Fetch data</div>
        </div>
      </div>
      <div id="footer">
        For informational purposes only
      </div>
    </main>
  </div>
</div>

<script src="../components/shell.js"></script>
<script src="dcf.js"></script>

</body>
</html>
